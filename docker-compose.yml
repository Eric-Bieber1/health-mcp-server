services:
  health-mcp:
    build: .
    container_name: health-mcp
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ../fitness-dashboard/data:/app/data
    env_file:
      - ../fitness-dashboard/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - TZ=America/Chicago
      - DB_PATH=/app/data/fitness.db
      - GARMIN_TOKENSTORE=/app/data/.garminconnect
      - PORT=3000
